{% extends "base.html" %}

{% block title %}Directory{% endblock %}

{% block content %}

<h2>Employee Directory</h2>

<!-- GET filter form -->
<form method="GET">
    <select name="department">
        <option value="">All</option>
        {% for d in departments %}
            <option value="{{ d }}"
                {% if selected_dept == d %}selected{% endif %}>
                {{ d }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Filter</button>
</form>

<hr>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Department</th>
        <th>Role</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp.name }}</td>
        <td>{{ emp.department }}</td>
        <td>{{ emp.role }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
